<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://avatars.githubusercontent.com/u/108773087">
    <title>群岛</title>
    <style>
        body {
            height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-weight: 900;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main {
            width: 18rem;
            height: 18rem;
            background-image: url(https://avatars.githubusercontent.com/u/108773087);
            background-repeat: no-repeat;
            background-size: cover;
            text-align: center;
            color: white;
            display: table;
            border-radius: 2rem;
        }

        .main>div {
            display: table-cell;
            vertical-align: middle;
        }

        .main>div>h1 {
            font-size: 4rem;
            margin: unset;
        }

        .main>div>p>a {
            color: white;
        }

        .footer {
            position: absolute;
            bottom: 0;
            font-weight: normal;
        }

        .footer>a {
            color: unset;
            text-decoration: unset;
            font-weight: 900;
        }
    </style>
</head>

<body>
    <div class="main">
        <div>
            <h1>群岛</h1>
            <p>岛主：<a href="https://github.com/naiba">naiba</a></p>
        </div>
    </div>
    <p class="footer">&copy; <a href="https://qundao.com">群岛</a> 2022</p>

</html>
